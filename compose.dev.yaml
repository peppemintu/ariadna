services:
  postgres:
    image: 'postgres:18'
    container_name: ariadna-postgres
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - 'POSTGRES_USER=${POSTGRES_USER}'
    ports:
      - '5433:5432'
    volumes:
      - ariadna-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ariadna -d ariadna"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ariadna-pgdata:
